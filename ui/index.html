<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUNO - AI Voice Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .logo { font-size: 48px; margin-bottom: 10px; }
        h1 { color: #333; margin-bottom: 10px; font-size: 32px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 16px; }
        .status {
            background: #f3f4f6;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 30px;
            font-size: 14px;
            color: #666;
        }
        .status.active    { background: #d1fae5; color: #065f46; }
        .status.recording { background: #fee2e2; color: #991b1b; }
        .status.processing{ background: #fef3c7; color: #92400e; }
        .status.error     { background: #fee2e2; color: #991b1b; }
        .mic-button {
            width: 120px; height: 120px;
            border-radius: 50%; border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; font-size: 48px; cursor: pointer;
            transition: all 0.3s; margin: 20px auto;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }
        .mic-button:hover  { transform: scale(1.05); }
        .mic-button:active { transform: scale(0.95); }
        .mic-button.recording  { background: #ef4444; animation: pulse 1.5s infinite; }
        .mic-button.processing { background: #f59e0b; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
        .box {
            border-radius: 10px; padding: 15px;
            margin: 15px 0; text-align: left; display: none;
        }
        .box.active { display: block; }
        .box-label { font-size: 12px; color: #666; margin-bottom: 5px; }
        .transcript-box { background: #f9fafb; }
        .response-box   { background: #eff6ff; }
        .response-box .box-label { color: #1e40af; font-weight: 600; }
        .response-box .box-text  { color: #1e3a8a; font-size: 14px; line-height: 1.6; }
        .error-box { background: #fee2e2; color: #991b1b; font-size: 14px; }
        .instructions { color: #666; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">🤖</div>
    <h1>JUNO</h1>
    <div class="subtitle">AI Voice Assistant</div>

    <div class="status" id="status">Checking server...</div>

    <button class="mic-button" id="micButton">🎤</button>
    <div class="instructions" id="instructions">Click the microphone to start</div>

    <div class="box transcript-box" id="transcriptBox">
        <div class="box-label">You said:</div>
        <div class="box-text" id="transcriptText"></div>
    </div>

    <div class="box response-box" id="responseBox">
        <div class="box-label">JUNO:</div>
        <div class="box-text" id="responseText"></div>
    </div>

    <div class="box error-box" id="errorBox"></div>
</div>

<script>
// ── Face Auth Guard ──────────────────────────────────────
(async function enforceAuth() {
    try {
        const s = await (await fetch('/status')).json();
        if (!s.face_auth_available) return;
        const p = new URLSearchParams(window.location.search);
        if (p.get('authenticated') === 'true') return;
        const token = sessionStorage.getItem('juno_session');
        if (!token) { window.location.replace('auth.html'); return; }
        const r = await (await fetch('/auth/check_session?token=' + token)).json();
        if (!r.valid) { sessionStorage.removeItem('juno_session'); window.location.replace('auth.html'); }
    } catch(e) { console.warn('Auth check skipped:', e.message); }
})();

// ── State ────────────────────────────────────────────────
let mediaRecorder=null, audioChunks=[], isRecording=false, audioStream=null;

const micButton       = document.getElementById('micButton');
const statusDiv       = document.getElementById('status');
const instructionsDiv = document.getElementById('instructions');
const transcriptBox   = document.getElementById('transcriptBox');
const transcriptText  = document.getElementById('transcriptText');
const responseBox     = document.getElementById('responseBox');
const responseText    = document.getElementById('responseText');
const errorBox        = document.getElementById('errorBox');

function updateStatus(msg, cls) {
    statusDiv.textContent = msg;
    statusDiv.className   = 'status ' + (cls||'');
}
function showError(msg) { errorBox.textContent=msg; errorBox.classList.add('active'); }
function hideError()    { errorBox.classList.remove('active'); }

// ── Check Server ─────────────────────────────────────────
async function checkServer() {
    try {
        const data = await (await fetch('/status')).json();
        if (data.status === 'running') {
            updateStatus('✅ Ready to listen', 'active');
            if (!data.stt_available) showError('STT not available - voice disabled.');
        } else { updateStatus('⚠️ Server not ready','error'); }
    } catch(e) {
        updateStatus('❌ Cannot connect to server','error');
        showError('Cannot connect to server. Make sure python server.py is running.');
    }
}

// ── Start Recording ──────────────────────────────────────
async function startRecording() {
    try {
        hideError();
        updateStatus('🎤 Requesting microphone...','processing');
        audioStream = await navigator.mediaDevices.getUserMedia({ audio:{echoCancellation:true,noiseSuppression:true} });
        updateStatus('🔴 Recording...','recording');

        const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus'
                       : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : '';
        mediaRecorder = mimeType ? new MediaRecorder(audioStream,{mimeType}) : new MediaRecorder(audioStream);
        audioChunks   = [];

        mediaRecorder.ondataavailable = e => { if(e.data.size>0) audioChunks.push(e.data); };
        mediaRecorder.onstop = async () => {
            if (audioChunks.length > 0) {
                await sendToServer(new Blob(audioChunks, {type: mediaRecorder.mimeType||'audio/webm'}));
            } else {
                showError('No audio recorded. Please try again.'); resetUI();
            }
        };

        mediaRecorder.start(100);
        isRecording = true;
        micButton.classList.add('recording');
        micButton.textContent        = '⏹️';
        instructionsDiv.textContent  = 'Click to stop recording';

    } catch(err) {
        console.error(err);
        let msg = err.name==='NotAllowedError'  ? 'Permission denied. Click 🔒 in address bar → Allow Microphone → Refresh page.'
                : err.name==='NotFoundError'    ? 'No microphone found. Please connect one.'
                : err.name==='NotReadableError' ? 'Microphone is in use by another app.'
                : 'Microphone error: ' + err.message;
        showError(msg); updateStatus('❌ Microphone error','error'); resetUI();
    }
}

// ── Stop Recording ───────────────────────────────────────
function stopRecording() {
    if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        audioStream.getTracks().forEach(t => t.stop());
        isRecording = false;
        updateStatus('⏳ Processing...','processing');
        micButton.classList.remove('recording');
        micButton.classList.add('processing');
        micButton.textContent       = '⏳';
        instructionsDiv.textContent = 'Processing your request...';
    }
}

// ── Send to Server ───────────────────────────────────────
async function sendToServer(blob) {
    try {
        updateStatus('📤 Sending to server...','processing');
        const ext = blob.type.includes('webm') ? 'webm' : 'wav';
        const fd  = new FormData();
        fd.append('file', blob, 'recording.' + ext);

        const res  = await fetch('/voice_chat', {method:'POST', body:fd});
        if (!res.ok) throw new Error('Server error: ' + res.status);
        const data = await res.json();

        if (data.error) throw new Error(data.error);

        if (data.transcript) {
            transcriptText.textContent = data.transcript;
            transcriptBox.classList.add('active');
        }
        if (data.response) {
            responseText.textContent = data.response;
            responseBox.classList.add('active');
        } else { throw new Error('No response from JUNO'); }

        updateStatus('✅ Ready to listen','active');
    } catch(err) {
        console.error(err);
        showError('Error: ' + err.message);
        updateStatus('❌ Error occurred','error');
    } finally { resetUI(); }
}

// ── Reset ─────────────────────────────────────────────────
function resetUI() {
    micButton.classList.remove('recording','processing');
    micButton.textContent       = '🎤';
    instructionsDiv.textContent = 'Click the microphone to start';
}

// ── Button Handler ────────────────────────────────────────
micButton.addEventListener('click', () => {
    if (isRecording) stopRecording(); else startRecording();
});

// ── Init ──────────────────────────────────────────────────
checkServer();
</script>
</body>
</html>
